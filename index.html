<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Product PDF Export</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  /* ---------- BRANDING: edit these to match your company ---------- */
  :root {
    --brand-primary: #547694;
    --brand-accent:  #d98c15;
    --brand-text:    #222;
  }
  /* ------------------------------------------------------------------ */

  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    padding: 16px;
    color: var(--brand-text);
    font-size: 14px;
  }
  h2 { margin: 0 0 4px 0; color: var(--brand-primary); }
  .sub { color: #666; margin-bottom: 16px; }
  .top-section { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 12px; }
  .top-section img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    border: 1px solid #eee;
    border-radius: 6px;
    background: #fafafa;
    flex-shrink: 0;
  }
  .top-section .no-image {
    width: 140px;
    height: 140px;
    border: 1px dashed #ccc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: 12px;
    text-align: center;
    flex-shrink: 0;
  }
  .top-details { flex: 1; }
  .brand-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--brand-primary);
  }
  .brand-header img { height: 32px; width: auto; }
  .brand-header span { font-weight: 600; color: var(--brand-primary); font-size: 15px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
  .row span:first-child { color: #666; }
  .section-title { margin-top: 16px; font-weight: 600; color: var(--brand-primary); }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13px; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid #eee; }
  th { color: #666; font-weight: 500; }
  td.num, th.num { text-align: right; }
  button {
    margin-top: 20px;
    background: var(--brand-primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { background: #aaa; cursor: default; }
  #status { margin-top: 10px; color: #666; font-size: 12px; }
  #empty { color: #888; padding: 20px 0; }
  #debug-banner {
    display: none;
    background: #fdecea;
    color: #611a15;
    border: 1px solid #f5c6cb;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    margin-bottom: 12px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="brand-header"><img id="brand-logo" alt="Coriander Designs" style="display:none" /><span>Coriander Designs</span></div>
<div id="debug-banner"></div>
<div id="empty">Select a row in the Products table to preview it here.</div>
<div id="content" style="display:none">
  <div class="top-section">
    <div id="image-wrap"><div class="no-image">No image</div></div>
    <div class="top-details">
      <h2 id="p-name"></h2>
      <div class="sub" id="p-id"></div>
      <div class="row"><span>Category</span><span id="p-category"></span></div>
      <div class="row"><span>Product Type</span><span id="p-line"></span></div>
      <div class="row"><span>Status</span><span id="p-status"></span></div>
    </div>
  </div>

  <div class="row"><span>Description</span><span id="p-desc"></span></div>

  <div class="section-title">Materials</div>
  <table id="materials-table"><thead>
    <tr><th>Material</th><th class="num">Qty</th><th class="num">Unit Cost</th><th class="num">Ext. Cost</th></tr>
  </thead><tbody></tbody></table>

  <div class="section-title">Labor</div>
  <table id="labor-table"><thead>
    <tr><th>Category</th><th class="num">Hours</th><th class="num">Rate/hr</th><th class="num">Ext. Cost</th></tr>
  </thead><tbody></tbody></table>

  <div class="section-title">Cost Summary</div>
  <div class="row"><span>Total Material Cost</span><span id="p-matcost"></span></div>
  <div class="row"><span>Total Labor Cost</span><span id="p-labcost"></span></div>
  <div class="row"><span>Overhead</span><span id="p-oh"></span></div>
  <div class="row"><span><strong>Total Cost</strong></span><span id="p-totcost"></span></div>
  <div class="row"><span><strong>Selling Price</strong></span><span id="p-price"></span></div>
  <div class="row"><span>Gross Margin %</span><span id="p-margin"></span></div>

  <button id="export-btn">Export Branded PDF</button>
  <div id="status"></div>
</div>

<script>
const COMPANY_NAME = "Coriander Designs";
const COMPANY_TAGLINE = "Pricing Quote / Spec Sheet";
const LOGO_URL = "https://images.squarespace-cdn.com/content/v1/616eec89457ae94eaa52eddb/ce50f7c6-1c7c-49c3-ab8f-5c3f533c426b/Coriander+Logo+Dark+Blue+AMD.png?format=500w";

let LOGO_DATA_URI = null; // populated once by loadLogo(), used both on-screen and in the PDF

async function urlToDataUrl(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`Failed to fetch ${url}`);
  const blob = await response.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function loadLogo() {
  try {
    LOGO_DATA_URI = await urlToDataUrl(LOGO_URL);
    const logoImg = document.getElementById('brand-logo');
    logoImg.src = LOGO_DATA_URI;
    logoImg.style.display = 'inline';
  } catch (err) {
    // Non-fatal: PDF will just skip the logo image if this fails (e.g. CORS block from the CDN)
    console.warn('Could not load logo:', err.message);
  }
}
loadLogo();

let currentRecord = null;
let materialsRows = [];
let laborRows = [];

grist.ready({
  requiredAccess: 'full',   // needed to read Product_Materials / Product_Labor / Materials / Labor_Rates
  columns: [] // not restricting to a mapped subset; we read the raw record
});

// Converts Grist's column-oriented fetchTable result into an array of row objects
function toRows(colData) {
  const ids = colData.id;
  const rows = [];
  for (let i = 0; i < ids.length; i++) {
    const row = { id: ids[i] };
    for (const col of Object.keys(colData)) {
      row[col] = colData[col][i];
    }
    rows.push(row);
  }
  return rows;
}

function money(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return "$" + Number(n).toFixed(2);
}

// Attachment (Image) columns store a list of attachment row IDs, not raw bytes.
// Binary content requires a short-lived access token, then a normal authenticated fetch.
async function getAttachmentDataUrl(attachmentId) {
  const tokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
  const url = `${tokenInfo.baseUrl}/attachments/${attachmentId}/download?auth=${tokenInfo.token}`;
  const response = await fetch(url);
  if (!response.ok) throw new Error(`Failed to fetch attachment ${attachmentId}`);
  const blob = await response.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result); // e.g. "data:image/png;base64,...."
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function getImageDimensions(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// Grist attachment mime types (png/jpeg/etc.) become the jsPDF image format.
function formatFromDataUrl(dataUrl) {
  const match = dataUrl.match(/^data:image\/(\w+);/);
  const type = match ? match[1].toUpperCase() : 'PNG';
  return type === 'JPG' ? 'JPEG' : type;
}

let currentImageDataUrl = null; // cached for the currently selected record, used by both preview and PDF

function showDebug(message) {
  const banner = document.getElementById('debug-banner');
  banner.textContent = message;
  banner.style.display = 'block';
  console.error(message);
}

window.addEventListener('error', (e) => showDebug(`Script error: ${e.message}`));
window.addEventListener('unhandledrejection', (e) => showDebug(`Unhandled error: ${e.reason?.message || e.reason}`));

async function loadRelatedData(record) {
  const [pmData, plData, matData, laborRateData] = await Promise.all([
    grist.docApi.fetchTable('Product_Materials'),
    grist.docApi.fetchTable('Product_Labor'),
    grist.docApi.fetchTable('Materials'),
    grist.docApi.fetchTable('Labor_Rates'),
  ]);

  const materials = toRows(matData);
  const laborRates = toRows(laborRateData);
  const matById = Object.fromEntries(materials.map(m => [m.id, m]));
  const laborById = Object.fromEntries(laborRates.map(l => [l.id, l]));

  const pm = toRows(pmData).filter(r => r.Product_ID === record.id);
  const pl = toRows(plData).filter(r => r.Product_ID === record.id);

  materialsRows = pm.map(r => ({
    name: matById[r.Material_Name] ? matById[r.Material_Name].Material_Name : `#${r.Material_Name}`,
    qty: r.Quantity,
    unitCost: r.Unit_Cost,
    extCost: r.Extended_Cost,
  }));

  laborRows = pl.map(r => ({
    category: laborById[r.Labor_Category] ? laborById[r.Labor_Category].Labor_Category : `#${r.Labor_Category}`,
    hours: r.Hours,
    rate: r.Rate_Per_Hour,
    extCost: r.Extended_Cost,
  }));
}

function renderPreview(record) {
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  document.getElementById('p-name').textContent = record.Product_Name || '(unnamed product)';
  document.getElementById('p-id').textContent = record.Product_ID || '';
  document.getElementById('p-category').textContent = record.Category || '—';
  document.getElementById('p-line').textContent = record.Product_Type || '—';
  document.getElementById('p-status').textContent = record.Status || '—';
  document.getElementById('p-desc').textContent = record.Description || '—';

  document.getElementById('p-matcost').textContent = money(record.Total_Material_Cost);
  document.getElementById('p-labcost').textContent = money(record.Total_Labor_Cost);
  document.getElementById('p-oh').textContent = money(record.Overhead_Cost);
  document.getElementById('p-totcost').textContent = money(record.Total_Cost);
  document.getElementById('p-price').textContent = money(record.Selling_Price);
  document.getElementById('p-margin').textContent =
    (record.Gross_Margin__ !== null && record.Gross_Margin__ !== undefined)
      ? (Number(record.Gross_Margin__) * 100).toFixed(1) + "%" : "—";

  const matBody = document.querySelector('#materials-table tbody');
  matBody.innerHTML = materialsRows.map(m =>
    `<tr><td>${m.name}</td><td class="num">${m.qty ?? ''}</td><td class="num">${money(m.unitCost)}</td><td class="num">${money(m.extCost)}</td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:#999">No materials</td></tr>';

  const labBody = document.querySelector('#labor-table tbody');
  labBody.innerHTML = laborRows.map(l =>
    `<tr><td>${l.category}</td><td class="num">${l.hours ?? ''}</td><td class="num">${money(l.rate)}</td><td class="num">${money(l.extCost)}</td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:#999">No labor</td></tr>';
}

async function loadProductImage(record) {
  currentImageDataUrl = null;
  const wrap = document.getElementById('image-wrap');
  let attachmentIds;

  // Attachments-type columns are NOT included in the record object from grist.onRecord,
  // even with full access. Pull the raw column data directly instead.
  try {
    const productsData = await grist.docApi.fetchTable('Products');
    const rows = toRows(productsData);
    const row = rows.find(r => r.id === record.id);
    attachmentIds = row ? row.Image : undefined;
    // grist.docApi.fetchTable returns raw encoded values; list-type columns
    // (Attachments, RefList, ChoiceList) come back as ['L', id1, id2, ...].
    if (Array.isArray(attachmentIds) && attachmentIds[0] === 'L') {
      attachmentIds = attachmentIds.slice(1);
    }
    console.log('Image attachment IDs (via fetchTable):', attachmentIds);
  } catch (err) {
    showDebug(`Could not read Image column: ${err.message}`);
  }

  if (!attachmentIds || attachmentIds.length === 0) {
    wrap.innerHTML = '<div class="no-image">No image</div>';
    return;
  }

  try {
    const dataUrl = await getAttachmentDataUrl(attachmentIds[0]);
    currentImageDataUrl = dataUrl;
    wrap.innerHTML = `<img src="${dataUrl}" alt="Product image" />`;
  } catch (err) {
    showDebug(`Image load failed: ${err.message}`);
    wrap.innerHTML = '<div class="no-image">Image failed to load</div>';
  }
}

grist.onRecord(async (record) => {
  try {
    currentRecord = record;
    console.log('Selected record:', record);
    console.log('record.Image raw value:', record.Image);
    await Promise.all([loadRelatedData(record), loadProductImage(record)]);
    renderPreview(record);
  } catch (err) {
    showDebug(`Error loading record: ${err.message}`);
  }
});

document.getElementById('export-btn').addEventListener('click', async () => {
  if (!currentRecord) return;
  try {
    await generatePDF(currentRecord);
  } catch (err) {
    console.error(err);
    document.getElementById('status').textContent = 'Failed to generate PDF — see console.';
  }
});

async function generatePDF(record) {
  const status = document.getElementById('status');
  status.textContent = 'Generating PDF…';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 40;
  let y = 50;

  // Header band
  doc.setFillColor(84, 118, 148); // matches --brand-primary (#547694)
  doc.rect(0, 0, pageWidth, 70, 'F');
  let textStartX = margin;
  if (LOGO_DATA_URI) {
    try {
      const logoDims = await getImageDimensions(LOGO_DATA_URI);
      const maxH = 40;
      const scale = maxH / logoDims.height;
      const w = logoDims.width * scale;
      doc.addImage(LOGO_DATA_URI, formatFromDataUrl(LOGO_DATA_URI), margin, 15, w, maxH);
      textStartX = margin + w + 12;
    } catch (err) {
      console.warn('Could not embed logo in PDF:', err.message);
    }
  }
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text(COMPANY_NAME, textStartX, 35);
  doc.setFontSize(10);
  doc.text(COMPANY_TAGLINE, textStartX, 52);

  // ---- Image (left) + product info / price (right) row ----
  y = 100;
  const imageBoxSize = 130;
  const rightColX = margin + imageBoxSize + 20;
  const rightColWidth = pageWidth - margin - rightColX;
  let rowBottom = y + imageBoxSize; // default height if no image

  if (currentImageDataUrl) {
    try {
      const dims = await getImageDimensions(currentImageDataUrl);
      const scale = Math.min(imageBoxSize / dims.width, imageBoxSize / dims.height);
      const w = dims.width * scale;
      const h = dims.height * scale;
      const imgX = margin + (imageBoxSize - w) / 2;
      const imgY = y + (imageBoxSize - h) / 2;
      doc.setDrawColor(230, 230, 230);
      doc.rect(margin, y, imageBoxSize, imageBoxSize); // light border box
      doc.addImage(currentImageDataUrl, formatFromDataUrl(currentImageDataUrl), imgX, imgY, w, h);
    } catch (err) {
      console.error('Could not embed product image:', err);
    }
  } else {
    doc.setDrawColor(230, 230, 230);
    doc.setFillColor(250, 250, 250);
    doc.roundedRect(margin, y, imageBoxSize, imageBoxSize, 4, 4, 'FD');
    doc.setFontSize(9);
    doc.setTextColor(170, 170, 170);
    doc.text('No image', margin + imageBoxSize / 2, y + imageBoxSize / 2, { align: 'center' });
  }

  // Right column: name / ID / category / line
  let ry = y + 4;
  doc.setTextColor(30, 30, 30);
  doc.setFontSize(16);
  const nameLines = doc.splitTextToSize(record.Product_Name || '(unnamed product)', rightColWidth);
  doc.text(nameLines, rightColX, ry + 14);
  ry += nameLines.length * 18 + 6;

  doc.setFontSize(10);
  doc.setTextColor(100, 100, 100);
  doc.text(`Product ID: ${record.Product_ID || ''}`, rightColX, ry);
  ry += 14;
  doc.text(`Category: ${record.Category || '—'}   |   Type: ${record.Product_Type || '—'}`, rightColX, ry);
  ry += 20;

  // Selling price highlight box, to the right of the image
  const priceBoxHeight = 46;
  doc.setFillColor(217, 140, 21); // --brand-accent
  doc.roundedRect(rightColX, ry, rightColWidth, priceBoxHeight, 4, 4, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(11);
  doc.text('Selling Price', rightColX + 12, ry + 18);
  doc.setFontSize(18);
  const priceText = money(record.Selling_Price);
  doc.text(priceText, rightColX + rightColWidth - 12 - doc.getTextWidth(priceText), ry + 32);
  ry += priceBoxHeight;

  rowBottom = Math.max(rowBottom, ry);
  y = rowBottom + 20;

  if (record.Description) {
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(10);
    const lines = doc.splitTextToSize(record.Description, pageWidth - margin * 2);
    doc.text(lines, margin, y);
    y += lines.length * 12 + 10;
  }

  if (materialsRows.length) {
    doc.autoTable({
      startY: y,
      margin: { left: margin, right: margin },
      head: [['Material', 'Qty', 'Unit Cost', 'Ext. Cost']],
      body: materialsRows.map(m => [m.name, String(m.qty ?? ''), money(m.unitCost), money(m.extCost)]),
      headStyles: { fillColor: [84, 118, 148] },
      styles: { fontSize: 9 },
      theme: 'grid',
    });
    y = doc.lastAutoTable.finalY + 16;
  }

  if (laborRows.length) {
    doc.autoTable({
      startY: y,
      margin: { left: margin, right: margin },
      head: [['Labor Category', 'Hours', 'Rate/hr', 'Ext. Cost']],
      body: laborRows.map(l => [l.category, String(l.hours ?? ''), money(l.rate), money(l.extCost)]),
      headStyles: { fillColor: [84, 118, 148] },
      styles: { fontSize: 9 },
      theme: 'grid',
    });
    y = doc.lastAutoTable.finalY + 20;
  }

  // Cost summary block
  doc.setFontSize(11);
  const summary = [
    ['Total Material Cost', money(record.Total_Material_Cost)],
    ['Total Labor Cost', money(record.Total_Labor_Cost)],
    ['Overhead', money(record.Overhead_Cost)],
    ['Total Cost', money(record.Total_Cost)],
  ];
  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    body: summary,
    theme: 'plain',
    styles: { fontSize: 10 },
    columnStyles: { 1: { halign: 'right' } },
  });
  y = doc.lastAutoTable.finalY + 10;

  const fileName = `${record.Product_ID || 'product'}-quote.pdf`;
  doc.save(fileName);
  status.textContent = `Saved ${fileName}`;
}
</script>
</body>
</html>
